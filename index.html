<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mentalisme">
<title>Mentalisme</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;user-select:none;overflow:hidden;}
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;}
@keyframes shakeDots{0%,100%{transform:translateX(0)}15%{transform:translateX(-14px)}30%{transform:translateX(14px)}45%{transform:translateX(-10px)}60%{transform:translateX(10px)}75%{transform:translateX(-5px)}90%{transform:translateX(5px)}}
.dots.shake{animation:shakeDots 0.5s ease;}
#menu{display:flex;background:radial-gradient(ellipse at 30% 20%,#3a0a2e,#1a0015 60%,#080008);}
#menu h1{font-size:26px;font-weight:700;margin-bottom:6px;text-align:center;}
#menu p{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:36px;text-align:center;}
.mbtn{width:270px;padding:15px;margin:7px 0;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer;display:block;text-decoration:none;text-align:center;}
.mbtn.p{background:#7a1535;color:#fff;}
.mbtn.s{background:rgba(255,255,255,0.12);color:#fff;}
#verrou{background:radial-gradient(ellipse at 50% 30%,#7a1040,#5a0a30 30%,#3d0620 60%,#1a0010);}
#verrou-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;}
.vmid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding-bottom:20px;}
.vtitle{font-size:20px;font-weight:400;color:#fff;margin-bottom:20px;text-align:center;padding:0 30px;}
.dots{display:flex;gap:20px;justify-content:center;}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.7);background:transparent;transition:background 0.05s;}
.dot.on{background:#fff;}
.vsub{font-size:11px;color:rgba(255,255,255,0.38);margin-top:12px;text-align:center;padding:0 40px;min-height:16px;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 28px;width:100%;max-width:360px;margin-bottom:0;margin-top:-80px;}
.key{aspect-ratio:1;border-radius:50%;background:rgba(175,38,75,0.52);border:none;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.key:active{background:rgba(255,255,255,0.85);transform:scale(0.95);}
.key.flash{background:rgba(255,255,255,0.35)!important;transition:none;}
.kn{font-size:40px;font-weight:400;line-height:1;}
.kn.shift{margin-bottom:13px;}
.ks{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.6);margin-top:1px;font-weight:600;}
.key.empty{background:transparent!important;pointer-events:none;}
.bottom-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:24px 36px 44px;}
.btn-bottom{font-size:17px;color:#fff;background:none;border:none;cursor:pointer;font-weight:400;}

.rbox{background:rgba(255,255,255,0.07);border-radius:16px;padding:18px;margin:18px 0;width:100%;max-width:320px;text-align:left;}

.rk{font-size:13px;color:rgba(255,255,255,0.45);}
.rv{font-size:15px;font-weight:700;color:#e05070;max-width:180px;text-align:right;}

function show(id){
  var screens=document.querySelectorAll('.screen');
  var current=null;
  screens.forEach(function(s){if(s.style.display==='flex')current=s;});
  var next=document.getElementById(id);
  if(!current||current===next){
    screens.forEach(function(s){s.style.display='none';s.style.transform='';s.style.transition='';});
    next.style.display='flex';
    return;
  }
  // Position le suivant en bas, invisible
  next.style.display='flex';
  next.style.transform='translateY(100%)';
  next.style.transition='none';
  next.style.zIndex='10';
  current.style.zIndex='5';
  current.style.transition='none';
  // Force reflow avant d'animer
  next.getBoundingClientRect();
  // Démarre l'animation
  next.style.transition='transform 0.62s cubic-bezier(0.22,1,0.36,1)';
  current.style.transition='transform 0.62s cubic-bezier(0.22,1,0.36,1)';
  next.style.transform='translateY(0)';
  current.style.transform='translateY(-30%)';
  setTimeout(function(){
    current.style.display='none';
    current.style.transform='';
    current.style.transition='';
    current.style.zIndex='';
    next.style.transition='';
    next.style.zIndex='';
  },650);
}

function drawDots(){
  var c=document.getElementById('dots');
  c.innerHTML='';
  var total = 6;
  for(var i=0;i<total;i++){
    var d=document.createElement('div');
    d.className='dot'+(i<input.length?' on':'');
    c.appendChild(d);
  }
  document.getElementById('vsub').textContent='';
}

function flash(btn){btn.classList.add("flash");setTimeout(function(){btn.classList.remove("flash");},120);}
function tap(v){
  var maxLen = 6;
  if(input.length>=maxLen) return;
  input+=v;
  drawDots();
  if(input.length===maxLen){
    if(step===0) setTimeout(savePIN,350);
    else if(step===1) setTimeout(saveBday,350);
    else setTimeout(openAccueil,350);
  }
}

function shakeDots(cb){
  var d=document.getElementById('dots');
  d.classList.remove('shake');
  void d.offsetWidth;
  d.classList.add('shake');
  setTimeout(function(){d.classList.remove('shake');cb();},500);
}

function savePIN(){pin=input;step=1;input='';shakeDots(function(){drawDots();});}

function saveBday(){
  var r=input;
  bday=r.substring(0,2)+'/'+r.substring(2,4)+'/'+r.substring(4,6);
  var k=parseInt(r.substring(2,4))+'/'+parseInt(r.substring(0,2));
  celeb=celebs[k]||'Une star secrete';
  step=2;input='';shakeDots(function(){drawDots();});
}

function openAccueil(){
  var layer=document.getElementById('badges');
  layer.innerHTML='';
  bpos.forEach(function(p){
    if(p.i>=pin.length) return;
    var el=document.createElement('div');
    el.className='badge';
    el.style.top=p.t;
    el.style.left=p.l;
    el.textContent=pin[p.i];
    layer.appendChild(el);
  });
  show('accueil');
}

function ouvrirPopup(){
  document.getElementById('p-pin').textContent=pin ? pin.substring(0,2)+' '+pin.substring(2,4)+' '+pin.substring(4,6) : '—';
  document.getElementById('p-bday').textContent=bday||'—';
  document.getElementById('p-celeb').textContent=celeb||'—';
  document.getElementById('popup').classList.add('open');
}

function fermerPopup(){
  document.getElementById('popup').classList.remove('open');
}

function lancer(){step=0;input='';pin='';bday='';celeb='';drawDots();show('verrou');}

function voirRecap(){
  document.getElementById('r-pin').textContent=pin||'(non capte)';
  document.getElementById('r-bday').textContent=bday||'(non captee)';
  document.getElementById('r-celeb').textContent=celeb||'(non captee)';
  show('recap');
}

function goMenu(){show('menu');}
